apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-stream-master-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: redis-stream
    name: redis-data-redis-stream-master-0
  hostPath:
    path: /data/redis-stream/master
---
