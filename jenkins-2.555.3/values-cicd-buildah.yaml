# Jenkins CI/CD Buildah agent override
# Replace <HARBOR_REGISTRY> and <HARBOR_PROJECT> with the local Harbor address
# and project before applying this file.

agent:
  imagePullSecretName: harbor-regcred
  podTemplates:
    buildah: |
      - name: buildah
        label: buildah
        serviceAccount: jenkins-agent
        # DNS에 Harbor 도메인이 등록되어 있지 않은 테스트 환경에서만 사용합니다.
        # 실제 환경에서는 Harbor Gateway, LoadBalancer, 또는 Ingress IP와 도메인으로 변경합니다.
        yaml: |
          spec:
            hostAliases:
              - ip: 172.18.0.2
                hostnames:
                  - harbor.test-cluster.com
        containers:
          - name: buildah
            image: <HARBOR_REGISTRY>/<HARBOR_PROJECT>/jenkins-buildah-agent:jdk21-rocky9
            command: "sleep"
            args: "999999"
            ttyEnabled: true
            privileged: false
            resourceRequestCpu: "500m"
            resourceRequestMemory: "1Gi"
            resourceLimitCpu: "2"
            resourceLimitMemory: "4Gi"
            envVars:
              - envVar:
                  key: BUILDAH_ISOLATION
                  value: chroot
              - envVar:
                  key: STORAGE_DRIVER
                  value: vfs
              - envVar:
                  key: XDG_RUNTIME_DIR
                  value: /tmp
              - envVar:
                  key: HOME
                  value: /home/jenkins
              - envVar:
                  key: CONTAINERS_STORAGE_CONF
                  value: /home/jenkins/.config/containers/storage.conf
        volumes:
          - emptyDirVolume:
              mountPath: /home/jenkins/.local/share/containers
              memory: false
          - emptyDirVolume:
              mountPath: /tmp
              memory: false

serviceAccountAgent:
  create: true
  name: jenkins-agent
  imagePullSecretName: harbor-regcred
