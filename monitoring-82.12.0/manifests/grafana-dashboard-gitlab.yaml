apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gitlab
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gitlab.json: |
    {
      "title": "GitLab / Overview",
      "uid": "gitlab-overview",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "type": "stat", "title": "HTTP 요청 처리율 (req/s)",
          "targets": [{ "expr": "sum(rate(gitlab_http_requests_total[1m]))", "legendFormat": "req/s" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2, "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "type": "stat", "title": "DB 커넥션 (활성)",
          "targets": [{ "expr": "sum(pg_stat_activity_count{state=\"active\"})", "legendFormat": "active" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },
        {
          "id": 3, "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "type": "stat", "title": "Redis 커넥션",
          "targets": [{ "expr": "redis_connected_clients", "legendFormat": "clients" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },
        {
          "id": 4, "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "type": "stat", "title": "Redis 메모리 사용",
          "targets": [{ "expr": "redis_memory_used_bytes", "legendFormat": "used" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 5, "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "type": "stat", "title": "Gitaly RPC 처리율 (req/s)",
          "targets": [{ "expr": "sum(rate(gitaly_service_client_requests_total[1m]))", "legendFormat": "rpc/s" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 6, "gridPos": { "x": 0, "y": 4, "w": 12, "h": 7 },
          "type": "timeseries", "title": "HTTP 요청 처리율 (상태코드별)",
          "targets": [{ "expr": "sum(rate(gitlab_http_requests_total[1m])) by (status)", "legendFormat": "{{status}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 7, "gridPos": { "x": 12, "y": 4, "w": 12, "h": 7 },
          "type": "timeseries", "title": "HTTP 응답 지연 (p99)",
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(gitlab_http_request_duration_seconds_bucket[5m])) by (le, method))", "legendFormat": "p99 {{method}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 8, "gridPos": { "x": 0, "y": 11, "w": 12, "h": 7 },
          "type": "timeseries", "title": "PostgreSQL DB 커넥션 상태",
          "targets": [{ "expr": "sum(pg_stat_activity_count) by (state)", "legendFormat": "{{state}}" }]
        },
        {
          "id": 9, "gridPos": { "x": 12, "y": 11, "w": 12, "h": 7 },
          "type": "timeseries", "title": "Redis 메모리 사용량",
          "targets": [{ "expr": "redis_memory_used_bytes", "legendFormat": "used" }, { "expr": "redis_memory_max_bytes", "legendFormat": "max" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 10, "gridPos": { "x": 0, "y": 18, "w": 12, "h": 7 },
          "type": "timeseries", "title": "Gitaly gRPC 요청 처리율",
          "targets": [{ "expr": "sum(rate(gitaly_service_client_requests_total[1m])) by (grpc_service)", "legendFormat": "{{grpc_service}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 11, "gridPos": { "x": 12, "y": 18, "w": 12, "h": 7 },
          "type": "timeseries", "title": "Redis 명령 처리율",
          "targets": [{ "expr": "sum(rate(redis_commands_processed_total[1m]))", "legendFormat": "cmd/s" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        }
      ]
    }
