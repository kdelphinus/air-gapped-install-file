# Monitoring (kube-prometheus-stack) Values for Air-gapped
# Version: 82.12.0 (Prometheus Community Chart)
#
# [Harbor push 규칙]
# upload_images_to_harbor_v3-lite.sh 는 이미지 경로의 마지막 세그먼트만 사용하여
# <NODE_IP>:30002/<HARBOR_PROJECT>/<name>:<tag> 형태로 업로드합니다.
# 따라서 모든 image.repository 를 library/<name> 형태로 통일합니다.

# 1. 전역 레지스트리 설정 (Harbor)
global:
  imageRegistry: "<NODE_IP>:30002"
  imagePullSecrets: []

# 2. Prometheus 설정
prometheus:
  prometheusSpec:
    image:
      repository: library/prometheus
      tag: "v3.10.0"
    # ---------------------------------------------------------
    # 스토리지 옵션 A: NFS 동적 프로비저닝 (nfs-provisioner StorageClass 사용)
    # PV를 자동 생성. nfs-provisioner가 설치되어 있어야 함.
    # ---------------------------------------------------------
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "nfs-provisioner"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # ---------------------------------------------------------
    # 스토리지 옵션 B: NFS 정적 할당 (PV 수동 생성 후 바인딩)
    # 사전 작업: 아래 예시로 PV를 미리 생성해둘 것
    #
    # apiVersion: v1
    # kind: PersistentVolume
    # metadata:
    #   name: prometheus-pv
    #   labels:
    #     app: prometheus
    # spec:
    #   capacity:
    #     storage: 50Gi
    #   accessModes: ["ReadWriteOnce"]
    #   reclaimPolicy: Retain
    #   storageClassName: ""
    #   nfs:
    #     server: <NFS_SERVER_IP>
    #     path: /nfs/prometheus
    # ---------------------------------------------------------
    # storageSpec:
    #   volumeClaimTemplate:
    #     spec:
    #       storageClassName: ""   # 빈 값: 동적 프로비저닝 비활성화
    #       accessModes: ["ReadWriteOnce"]
    #       resources:
    #         requests:
    #           storage: 50Gi
    #       selector:
    #         matchLabels:
    #           app: prometheus   # 위 PV의 label과 일치시켜 바인딩

# 3. Alertmanager 설정
alertmanager:
  alertmanagerSpec:
    image:
      repository: library/alertmanager
      tag: "v0.31.1"

# 4. Prometheus Operator 설정
prometheusOperator:
  image:
    repository: library/prometheus-operator
    tag: "v0.89.0"
  prometheusConfigReloader:
    image:
      repository: library/prometheus-config-reloader
      tag: "v0.89.0"
  admissionWebhooks:
    patch:
      image:
        repository: library/kube-webhook-certgen
        tag: "1.7.8"

# 5. Grafana 설정
grafana:
  enabled: true
  image:
    repository: library/grafana
    tag: "11.3.3"
  sidecar:
    image:
      repository: library/k8s-sidecar
      tag: "2.5.0"
  initChownData:
    image:
      repository: library/busybox
      tag: "1.31.1"
  # 스토리지 옵션 A: NFS 동적 프로비저닝
  persistence:
    enabled: true
    storageClassName: "nfs-provisioner"
    size: 10Gi
  # 스토리지 옵션 B: NFS 정적 할당 (PV 수동 생성 후 기존 PVC 지정)
  # 사전 작업: PV + PVC를 미리 생성해둘 것
  #
  # apiVersion: v1
  # kind: PersistentVolume
  # metadata:
  #   name: grafana-pv
  #   labels:
  #     app: grafana
  # spec:
  #   capacity:
  #     storage: 10Gi
  #   accessModes: ["ReadWriteOnce"]
  #   reclaimPolicy: Retain
  #   storageClassName: ""
  #   nfs:
  #     server: <NFS_SERVER_IP>
  #     path: /nfs/grafana
  #
  # persistence:
  #   enabled: true
  #   existingClaim: "grafana-pvc"   # 미리 생성한 PVC 이름
  adminPassword: "admin" # 초기 비밀번호
  grafana.ini:
    date_formats:
      default_timezone: Asia/Seoul

# 6. 서브차트 이미지
prometheus-node-exporter:
  image:
    repository: library/node-exporter
    tag: "v1.10.2"
kube-state-metrics:
  image:
    repository: library/kube-state-metrics
    tag: "v2.18.0"
