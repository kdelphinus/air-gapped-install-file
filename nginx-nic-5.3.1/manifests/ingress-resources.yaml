# 현재 동작 중인 Ingress 리소스 (pre-product 환경 기준)
# 적용일: 2026-03-31
# 비고: Envoy Gateway HTTPRoute → NGINX NIC Ingress 전환 후 검증 완료된 설정
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strato-portal-frontend-ingress
  namespace: strato-product
  annotations:
    nginx.org/client-max-body-size: "10M"
    nginx.org/mergeable-ingress-type: master
    nginx.org/redirect-to-https: "true"
  labels:
    app.kubernetes.io/instance: strato-portal-frontend
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: strato-portal-frontend
spec:
  ingressClassName: nginx
  rules:
    - host: pre-product.strato.co.kr
  tls:
    - hosts:
        - pre-product.strato.co.kr
      secretName: strato-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strato-portal-frontend-minion
  namespace: strato-product
  annotations:
    nginx.org/mergeable-ingress-type: minion
spec:
  ingressClassName: nginx
  rules:
    - host: pre-product.strato.co.kr
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: strato-auth-svc
                port:
                  number: 5555
          - path: /
            pathType: Prefix
            backend:
              service:
                name: strato-portal-frontend-svc
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: strato-product
  annotations:
    nginx.org/client-max-body-size: "20M"
    nginx.org/mergeable-ingress-type: minion
    nginx.org/location-snippets: |
      rewrite /gw(/|$)(.*) /$2 break;
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'PUT, GET, POST, DELETE, OPTIONS, PATCH' always;
      add_header 'Access-Control-Allow-Headers' '*' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      if ($request_method = 'OPTIONS') {
        return 204;
      }
  labels:
    app: api-gateway
    app.kubernetes.io/managed-by: Helm
spec:
  ingressClassName: nginx
  rules:
    - host: pre-product.strato.co.kr
      http:
        paths:
          - path: /gw
            pathType: Prefix
            backend:
              service:
                name: api-gateway-svc
                port:
                  number: 20987
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strato-monitoring-ingress
  namespace: monitoring
  annotations:
    nginx.org/mergeable-ingress-type: minion
    nginx.org/location-snippets: |
      rewrite /grafana(/|$)(.*) /$2 break;
      sub_filter '</body>' '<style>
        button[aria-label^="Menu for panel"],
        [data-testid="hover-header-container"] h6 {
          display: none !important;
        }
      </style></body>';
      sub_filter_once on;
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  ingressClassName: nginx
  rules:
    - host: pre-product.strato.co.kr
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-svc
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    nginx.org/basic-auth-realm: Authentication Required
    nginx.org/basic-auth-secret: prometheus-auth
    nginx.org/mergeable-ingress-type: minion
spec:
  ingressClassName: nginx
  rules:
    - host: pre-product.strato.co.kr
      http:
        paths:
          - path: /prometheus(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus-svc
                port:
                  number: 9090
