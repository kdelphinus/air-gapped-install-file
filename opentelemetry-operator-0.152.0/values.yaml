# OpenTelemetry Operator v0.114.1 (App v0.152.0) 헬름 차트 재정의 설정

# ── [1] 컨테이너 이미지 설정 ──────────────────────────────────
image:
  # install.sh 에 의해 자동 수정됩니다 (예: Harbor 레지스트리 경로)
  repository: "ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator"
  tag: "v0.152.0"
  imagePullPolicy: IfNotPresent

# ── [2] 어드미션 웹훅 및 인증서 설정 (Admission Webhooks) ─────
admissionWebhooks:
  # cert-manager를 활용하여 어드미션 웹훅 인증서를 안전하고 동적으로 자동 관리하도록 명시
  certManager:
    enabled: true
    # cert-manager가 생성할 발급자(Issuer) 정의 (필요 시 수정 가능)
    issuerRef:
      name: selfsigned-issuer
      kind: Issuer

# ── [3] Prometheus 메트릭 수집 및 서비스 모니터 설정 ──────────
prometheus:
  # 모니터링 컴포넌트(kube-prometheus-stack)와 연동하여 메트릭을 수집할 경우 활성화
  serviceMonitor:
    enabled: false
    # interval: 30s

# ── [4] 리소스 제한 설정 ─────────────────────────────────────
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
