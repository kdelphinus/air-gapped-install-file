apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-sentinel.redisHeadlessName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "redis-sentinel.nodeName" . }}
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
