apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alertrules
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    # -------------------------------------------------------
    # ArgoCD 알림
    # -------------------------------------------------------
    - name: argocd.rules
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status="OutOfSync"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD 앱 OutOfSync: {{ $labels.name }}"
            description: "앱 {{ $labels.name }} ({{ $labels.namespace }}) 이 5분 이상 OutOfSync 상태입니다."

        - alert: ArgoCDAppDegraded
          expr: argocd_app_info{health_status="Degraded"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD 앱 Degraded: {{ $labels.name }}"
            description: "앱 {{ $labels.name }} ({{ $labels.namespace }}) 이 5분 이상 Degraded 상태입니다."

        - alert: ArgoCDAppMissing
          expr: argocd_app_info{health_status="Missing"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD 앱 Missing: {{ $labels.name }}"
            description: "앱 {{ $labels.name }} 의 리소스를 찾을 수 없습니다."

    # -------------------------------------------------------
    # GitLab 알림
    # -------------------------------------------------------
    - name: gitlab.rules
      rules:
        - alert: GitLabHighHTTPErrorRate
          expr: |
            sum(rate(gitlab_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(gitlab_http_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GitLab HTTP 5xx 에러율 5% 초과"
            description: "GitLab HTTP 5xx 에러율이 {{ $value | humanizePercentage }} 입니다."

        - alert: GitLabPostgresHighConnections
          expr: sum(pg_stat_activity_count) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GitLab PostgreSQL 커넥션 과다"
            description: "PostgreSQL 활성 커넥션이 {{ $value }}개 입니다 (임계치: 80)."

        - alert: GitLabRedisHighMemory
          expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GitLab Redis 메모리 85% 초과"
            description: "Redis 메모리 사용률이 {{ $value | humanizePercentage }} 입니다."

        - alert: GitLabGitalyHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(gitaly_service_client_requests_seconds_bucket[5m])) by (le)
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GitLab Gitaly 응답 지연 p99 > 5s"
            description: "Gitaly RPC p99 지연이 {{ $value }}s 입니다."

    # -------------------------------------------------------
    # 노드 / 서버 (기본 룰 보완 — 임계치 명시)
    # -------------------------------------------------------
    - name: node.custom.rules
      rules:
        - alert: NodeDiskWillFillIn4Hours
          expr: |
            predict_linear(node_filesystem_avail_bytes{fstype!="tmpfs"}[1h], 4*3600) < 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "디스크 4시간 내 포화 예상: {{ $labels.device }}"
            description: "{{ $labels.instance }} 의 {{ $labels.mountpoint }} 가 4시간 내 가득 찰 것으로 예측됩니다."
