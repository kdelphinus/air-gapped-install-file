apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-route
  namespace: harbor
spec:
  parentRefs:
    - name: cmp-gateway       # 클러스터에 생성된 Gateway 리소스 이름으로 변경
      namespace: envoy-gateway-system
  hostnames:
    - "harbor.example.com"    # 실제 접속 도메인으로 변경 (install.sh EXTERNAL_HOSTNAME과 일치)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor         # Harbor Helm 릴리스 이름 (기본: harbor)
          port: 80             # Harbor 내부 서비스 포트 (NodePort 30002 아님)
