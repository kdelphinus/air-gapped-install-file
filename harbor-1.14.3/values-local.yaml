# Harbor v1.14.3 Values — 로컬 테스트용
# ctr로 이미지 로드 후 Harbor 없이 배포할 때 사용
# 배포: helm upgrade --install harbor ./charts/harbor \
#          -f values.yaml -f values-local.yaml -n harbor

# 이미지 캐시 사용 (ctr import 후)
imagePullPolicy: IfNotPresent

# NodePort — 로컬 접속용
expose:
  type: nodePort
  tls:
    enabled: false
  nodePort:
    ports:
      http:
        nodePort: 30002
      https:
        nodePort: 30003

# 외부 접속 주소 — <NODE_IP> 를 실제 노드 IP로 변경
externalURL: http://<NODE_IP>:30002

# 내부 TLS 비활성화 (로컬 테스트 간소화)
internalTLS:
  enabled: false

# Trivy 비활성화 (로컬 테스트 시 불필요)
trivy:
  enabled: false
  skipUpdate: true
  offlineScan: true

# 스토리지 — 로컬 HostPath (단일 PVC 공유)
persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      existingClaim: "harbor-pvc"
      subPath: registry
    database:
      existingClaim: "harbor-pvc"
      subPath: database
    jobservice:
      jobLog:
        existingClaim: "harbor-pvc"
        subPath: jobservice-logs
    redis:
      existingClaim: "harbor-pvc"
      subPath: redis
    trivy:
      existingClaim: "harbor-pvc"
      subPath: trivy
  imageChartStorage:
    type: filesystem

# 리소스 제한 완화 (로컬 환경 자원 절약)
nginx:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

core:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

registry:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

jobservice:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

portal:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

database:
  internal:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

redis:
  internal:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
