# Harbor v1.14.3 Values — 로컬 ctr 이미지용
# ctr로 이미지 로드 후 Harbor 없이 배포할 때 사용
# 배포: helm upgrade --install harbor ./charts/harbor \
#          -f values.yaml -f values-local.yaml -n harbor
#
# 사전 준비:
#   for f in images/*.tar; do sudo ctr -n k8s.io images import "$f"; done

imagePullPolicy: IfNotPresent

# 내부 TLS 비활성화 (로컬 테스트 간소화)
internalTLS:
  enabled: false

nginx:
  image:
    repository: goharbor/nginx-photon
    tag: v2.10.3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

portal:
  image:
    repository: goharbor/harbor-portal
    tag: v2.10.3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

core:
  image:
    repository: goharbor/harbor-core
    tag: v2.10.3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

jobservice:
  image:
    repository: goharbor/harbor-jobservice
    tag: v2.10.3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

registry:
  registry:
    image:
      repository: goharbor/registry-photon
      tag: v2.10.3
  controller:
    image:
      repository: goharbor/harbor-registryctl
      tag: v2.10.3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

trivy:
  image:
    repository: goharbor/trivy-adapter-photon
    tag: v2.10.3

database:
  internal:
    image:
      repository: goharbor/harbor-db
      tag: v2.10.3
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

redis:
  internal:
    image:
      repository: goharbor/redis-photon
      tag: v2.10.3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

exporter:
  image:
    repository: goharbor/harbor-exporter
    tag: v2.10.3
