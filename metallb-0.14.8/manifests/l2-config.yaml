# MetalLB L2 Configuration
# ⚠️ spec.addresses 의 "- <start>-<end>" 라인은 ./scripts/install.sh 가 자동 치환합니다.
#    수동 편집 시 형식을 유지하세요 (한 줄에 범위 하나, 들여쓰기 보존).

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  # 기존 호스트와 충돌하지 않는 유휴 IP 대역으로 수정 (예: 10.0.0.200-10.0.0.250)
  addresses:
    - 172.30.235.200-172.30.235.210

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - first-pool
