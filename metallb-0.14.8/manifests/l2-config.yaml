# MetalLB L2 Configuration (변수화 버전)
# 사용자가 자신의 환경에 맞게 IPAddressPool 범위를 수정해야 합니다.

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  # 기존 호스트와 충돌하지 않는 유휴 IP 대역으로 수정 (예: 10.0.0.200-10.0.0.250)
  addresses:
    - 172.30.235.200-172.30.235.210

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - first-pool
