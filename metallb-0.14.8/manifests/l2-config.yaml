# MetalLB L2 Configuration (변수화 버전)
# 사용자가 자신의 환경에 맞게 IPAddressPool 범위를 수정해야 합니다.

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  # LoadBalancer가 할당할 수 있는 IP 대역 (예: 192.168.1.200-192.168.1.250)
  addresses:
    - {{ .Values.loadBalancerIPRange }}

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - first-pool
