# Monitoring (kube-prometheus-stack) Values for Air-gapped
# Version: 62.0.0 (Prometheus Community Chart)
#
# [Harbor push 규칙]
# upload_images_to_harbor_v3-lite.sh 는 이미지 경로의 마지막 세그먼트만 사용하여
# <NODE_IP>:30002/<HARBOR_PROJECT>/<name>:<tag> 형태로 업로드합니다.
# 따라서 모든 image.repository 를 library/<name> 형태로 통일합니다.

# 1. 전역 레지스트리 설정 (Harbor)
global:
  imageRegistry: "<NODE_IP>:30002"
  imagePullSecrets: []

# 2. Prometheus 설정
prometheus:
  prometheusSpec:
    image:
      repository: library/prometheus
      tag: "v2.54.1"
    # ---------------------------------------------------------
    # 스토리지 선택 (NFS 사용 시)
    # ---------------------------------------------------------
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "nfs-provisioner"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # ---------------------------------------------------------
    # 스토리지 선택 (HostPath 사용 시 - 수동 PVC 생성 필요)
    # ---------------------------------------------------------
    # persistence:
    #   enabled: true
    #   storageClass: "hostpath"
    #   size: 50Gi

# 3. Alertmanager 설정
alertmanager:
  alertmanagerSpec:
    image:
      repository: library/alertmanager
      tag: "v0.27.0"

# 4. Prometheus Operator 설정
prometheusOperator:
  image:
    repository: library/prometheus-operator
    tag: "v0.76.1"
  prometheusConfigReloader:
    image:
      repository: library/prometheus-config-reloader
      tag: "v0.76.1"
  admissionWebhooks:
    patch:
      image:
        repository: library/kube-webhook-certgen
        tag: "v20221220-controller-v1.5.1-58-g787ea74b6"

# 5. Grafana 설정
grafana:
  enabled: true
  image:
    repository: library/grafana
    tag: "11.1.0"
  sidecar:
    image:
      repository: library/k8s-sidecar
      tag: "1.27.4"
  initChownData:
    image:
      repository: library/busybox
      tag: "1.31.1"
  persistence:
    enabled: true
    storageClassName: "nfs-provisioner"
    size: 10Gi
  adminPassword: "admin" # 초기 비밀번호

# 6. 서브차트 이미지
prometheus-node-exporter:
  image:
    repository: library/node-exporter
    tag: v1.8.2
kube-state-metrics:
  image:
    repository: library/kube-state-metrics
    tag: v2.13.0
