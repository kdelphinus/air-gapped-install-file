# Monitoring (kube-prometheus-stack) Values for Air-gapped
# Version: 62.0.0 (Prometheus Community Chart)

# 1. 전역 레지스트리 설정 (Harbor)
global:
  imageRegistry: "192.168.1.100:30002"
  imagePullSecrets: []

# 2. Prometheus 설정 (스토리지 선택형)
prometheus:
  prometheusSpec:
    # ---------------------------------------------------------
    # 스토리지 선택 (NFS 사용 시)
    # ---------------------------------------------------------
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "nfs-provisioner" # NFS 사용 시
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # ---------------------------------------------------------
    # 스토리지 선택 (HostPath 사용 시 - 수동 PVC 생성 필요)
    # ---------------------------------------------------------
    # persistence:
    #   enabled: true
    #   storageClass: "hostpath" 
    #   size: 50Gi

# 3. Grafana 설정
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: "nfs-provisioner"
    size: 10Gi
  adminPassword: "admin" # 초기 비밀번호

# 4. 개별 이미지 상세 경로 (Helm 차트에서 자동으로 global.imageRegistry를 참고하도록 설정 가능)
# 필요 시 여기에 개별 리포지토리 이름을 명시합니다.
prometheus-node-exporter:
  image:
    repository: library/node-exporter
    tag: v1.8.2
kube-state-metrics:
  image:
    repository: library/kube-state-metrics
    tag: v2.13.0
