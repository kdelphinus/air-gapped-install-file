---
# ArgoCD Application Controller (배포 상태 추적 메트릭)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: argocd-application-controller
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
# ArgoCD Server
apiVersion: monitoring.coreos.com/v1
