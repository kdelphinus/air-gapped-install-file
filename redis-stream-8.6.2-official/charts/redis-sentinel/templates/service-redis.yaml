---
# Redis ClusterIP 서비스 (애플리케이션 → Redis 접속)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-sentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "redis-sentinel.nodeName" . }}
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
# Sentinel ClusterIP 서비스 (애플리케이션 → Sentinel 접속)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-sentinel.fullname" . }}-sentinel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "redis-sentinel.sentinelName" . }}
  ports:
  - name: sentinel
    port: 26379
    targetPort: 26379
