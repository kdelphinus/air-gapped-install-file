# Velero v1.14.1 Values - 로컬 ctr 이미지용
# ctr로 이미지 로드 후 Harbor 없이 배포할 때 사용

# 1. 이미지 설정 (ctr import 후 로컬)
image:
  repository: velero/velero
  tag: v1.14.1
  pullPolicy: IfNotPresent

# CRD 업그레이드 훅 비활성화
upgradeCRDs: false

# 2. 플러그인 및 스토리지 설정
configuration:
  backupStorageLocation:
  - name: default
    provider: aws
    bucket: velero
    config:
      region: minio
      s3ForcePathStyle: "true"
      s3Url: http://minio:9000
  
  # 메인 Pod 환경 변수 설정
  extraEnvVars:
    AWS_EC2_METADATA_DISABLED: "true"

# [주의] Secret을 사용하되, 스크립트에서 Helm 소유권을 주입하여 생성합니다.
credentials:
  useSecret: true
  name: velero-s3-credentials

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# 4. PVC 데이터 백업 (Kopia 사용 권장)
snapshotsEnabled: false
deployNodeAgent: true
nodeAgent:
  extraEnvVars:
    AWS_EC2_METADATA_DISABLED: "true"

# 5. 스케줄링 설정
schedules:
  daily-backup:
    schedule: "0 1 * * *" 
    template:
      includedNamespaces: ["*"]
      ttl: 720h
