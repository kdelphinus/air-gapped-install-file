# ============================================================
# GitLab 18.7 — 폐쇄망 설치 values
#
# [선택 설치] 섹션의 각 컴포넌트는 필요에 따라 활성화하세요.
# 기본값: 로컬 개발 최소 구성 (git 저장소 + 기본 UI)
# ============================================================

# ============================================================
# [필수] 기본 환경 설정
# ============================================================
global:
  edition: ce
  hosts:
    domain: gitlab.devops.internal # 내부 도메인에 맞게 변경 (DNS 없이 쓸 경우 /etc/hosts에 등록)
    externalIP: 1.1.1.213   # 실제 노드 IP로 변경 — GitLab이 external_url 생성에 사용
    https: false

  image:
    registry: 1.1.1.213:30002 # Harbor domain
    repository: library        # Harbor Project
    pullPolicy: IfNotPresent

  # ── Ingress 방식 선택 (1, 2, 3 중 하나만 활성화) ──────────

  # 1. Gateway API(Envoy)를 사용할 때
  ingress:
    enabled: false
    configureCertmanager: false
    tls:
      enabled: false

  # 2. 이미 설치된 ingress nginx를 사용할 때
  # ingress:
  #   enabled: true
  #   configureCertmanager: false
  #   class: "none"
  #   tls:
  #     enabled: false

  # 3. gitlab 내장 ingress nginx를 사용할 때
  # ingress:
  #   enabled: true
  #   configureCertmanager: false
  #   class: gitlab-nginx
  #   tls:
  #     enabled: false

  # ── [선택] Kubernetes Agent Server (KAS) ──────────────────
  # GitLab과 K8s 클러스터 연동 기능 (GitLab Agent for Kubernetes).
  # 로컬 개발 전용이거나 K8s 연동이 필요 없으면 false 유지.
  kas:
    enabled: false

  # ── [선택] 컨테이너 레지스트리 ────────────────────────────
  # Docker 이미지를 GitLab에 Push/Pull하는 기능.
  # Git 저장소·CI만 사용한다면 false 유지.
  registry:
    enabled: false

# ============================================================
# [선택] 인그레스 컨트롤러 (gitlab 내장 nginx)
# 3번 방식 선택 시 아래 블록 활성화
# ============================================================
nginx-ingress:
  enabled: false
  # enabled: true
  # controller:
  #   ingressClassResource:
  #     name: gitlab-nginx
  #     controllerValue: "k8s.io/gitlab-nginx"
  #   image:
  #     registry: 1.1.1.213:30002
  #     repository: library/ingress-nginx-controller
  #     tag: "v1.11.8"
  #     digest: ""
  #   service:
  #     type: NodePort
  #     nodePorts:
  #       http: 30080
  #       https: 30443
  #       ssh: 30022

# ============================================================
# [선택] TLS 인증서 관리 (cert-manager)
# HTTP 접속만 사용한다면 아래 블록 전체 주석 유지.
# ============================================================
installCertmanager: false
global:
  ingress:
    configureCertmanager: false

#============================================================
# [선택] CI/CD Runner
# CI/CD 파이프라인이 필요할 때 true로 변경.
# 활성화 시 이미지(gitlab-runner) 사전 업로드 필요.
# ============================================================
gitlab-runner:
  install: false

# ============================================================
# [선택] 모니터링 (Prometheus + gitlab-exporter)
# 리소스 현황 모니터링이 필요할 때 true로 변경.
# ============================================================
prometheus:
  install: false

# ============================================================
# [리소스] 컴포넌트별 CPU / Memory 설정
#
# 기준 노드   : 8 core / 16 GB (단일 노드)
# 공존 서비스 : Harbor ~2G / Jenkins ~1.5G / ArgoCD ~0.5G / 시스템 ~2G
# GitLab 가용 : 약 10G (limits 합계 ~6.5G 로 여유 확보)
#
# requests 합계 : ~1.0 CPU / ~2.6Gi
# limits   합계 : ~5.4 CPU / ~6.5Gi
# ============================================================

gitlab:
  gitlab-exporter:
    enabled: false  # prometheus 비활성화 시 함께 꺼두는 것을 권장

  webservice:
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2.5Gi

  sidekiq:
    resources:
      requests:
        cpu: 500m
        memory: 700Mi
      limits:
        cpu: 1
        memory: 1.5Gi
    # /tmp sticky bit 수정 — 이미지 빌드 시 0777(sticky 없음)로 인한 Ruby tmpdir 오류 방지
    # emptyDir 단독으로 1777이 보장되지 않는 kubelet 버전이 있으므로 initContainer로 명시 보강
    extraVolumes: |
      - name: sidekiq-tmp
        emptyDir: {}
    extraVolumeMounts: |
      - name: sidekiq-tmp
        mountPath: /tmp
    extraInitContainers: |
      - name: fix-tmp
        image: "{{ .Values.global.image.registry }}/{{ .Values.global.image.repository }}/gitlab-base:v18.7.0"
        command: ['sh', '-c', 'chmod 1777 /tmp']
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: sidekiq-tmp
          mountPath: /tmp

  gitaly:
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        cpu: 1
        memory: 800Mi
    persistence:
      storageClass: manual

  gitlab-shell:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        cpu: 1
        memory: 2Gi

  toolbox:
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 512Mi

postgresql:
  image:
    tag: "16.2.0"
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      storageClass: manual

redis:
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    persistence:
      storageClass: manual

minio:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    storageClass: manual
