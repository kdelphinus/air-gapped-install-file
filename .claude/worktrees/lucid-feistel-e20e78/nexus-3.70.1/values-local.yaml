# Nexus Repository Manager v3.70.1 Values - 로컬 ctr 이미지용
# ctr로 이미지 로드 후 Harbor 없이 배포할 때 사용
# 배포: helm upgrade --install ... -f values-local.yaml

# 1. 이미지 설정 (ctr import 후 로컬)
image:
  repository: sonatype/nexus3
  tag: 3.70.1
  pullPolicy: IfNotPresent

# 2. 스토리지 설정
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: "local-path-retain"
  storageSize: 100Gi

# 3. 도메인 설정
# 도메인 라우팅은 manifests/httproute.yaml (Envoy Gateway HTTPRoute) 사용
# chart 기본 Ingress는 비활성화
ingress:
  enabled: false

# 4. 네트워크 설정
service:
  type: NodePort
  ports:
    - name: nexus-ui
      port: 8081
      nodePort: 30081

# 4. 리소스 제한 (JVM 메모리 설정 필수)
nexus:
  # JVM 최적화 (대용량 전송 시 증가 권장)
  env:
    - name: INSTALL4J_ADD_VM_PARAMS
      value: "-Xms2703m -Xmx2703m -XX:MaxDirectMemorySize=2703m"
