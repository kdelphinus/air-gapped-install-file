apiVersion: v1
kind: Secret
metadata:
  name: mariadb-backup-secret
  namespace: mariadb
type: Opaque
stringData:
  # Galera StatefulSet의 첫 번째 Pod를 백업 소스로 지정
  # 형식: <pod-name>.<headless-service-name>.<namespace>.svc.cluster.local
  # 실제 StatefulSet/Service 이름에 맞게 수정 필요
  MYSQL_HOST: "mariadb-0.mariadb-headless.mariadb.svc.cluster.local"
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "CHANGE_ME"
