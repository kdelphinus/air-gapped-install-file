apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: velero
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: <MINIO_IMAGE>
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: velero
spec:
  template:
    spec:
      containers:
        - name: mc
          image: <MC_IMAGE>
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
                echo "Waiting for MinIO..."
                sleep 5
              done
              mc mb myminio/velero || true
          env:
            - name: MC_HOST_myminio
              value: http://minioadmin:minioadmin@minio:9000
      restartPolicy: OnFailure
