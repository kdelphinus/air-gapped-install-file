global
    daemon

defaults
    mode tcp
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# -------------------------------------------------------
# HTTP (80 -> NodePort 30080)
# -------------------------------------------------------
frontend http-in
    bind *:80
    mode tcp
    default_backend envoy-http

backend envoy-http
    mode tcp
    # send-proxy-v2: PROXY Protocol v2(바이너리) 헤더 추가
    # 노드 IP 목록을 실제 환경에 맞게 수정하세요
    server node1 <NODE1_IP>:30080 send-proxy-v2
    server node2 <NODE2_IP>:30080 send-proxy-v2
    server node3 <NODE3_IP>:30080 send-proxy-v2

# -------------------------------------------------------
# HTTPS (443 -> NodePort 30443)
# -------------------------------------------------------
frontend https-in
    bind *:443
    mode tcp
    default_backend envoy-https

backend envoy-https
    mode tcp
    server node1 <NODE1_IP>:30443 send-proxy-v2
    server node2 <NODE2_IP>:30443 send-proxy-v2
    server node3 <NODE3_IP>:30443 send-proxy-v2
